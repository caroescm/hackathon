<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 100" width="80" height="100">
  <defs>
    <clipPath id="shield-clip">
      <path d="M40,4 L76,18 L76,58 Q76,84 40,96 Q4,84 4,58 L4,18 Z"/>
    </clipPath>
  </defs>
  <!-- Shield stripes: red - white - red (Peru flag) -->
  <rect x="4" y="4" width="24" height="92" fill="#BF0A30" clip-path="url(#shield-clip)"/>
  <rect x="28" y="4" width="24" height="92" fill="#FFFFFF" clip-path="url(#shield-clip)"/>
  <rect x="52" y="4" width="24" height="92" fill="#BF0A30" clip-path="url(#shield-clip)"/>
  <!-- Cinchona tree (center, simplified) -->
  <rect x="37" y="38" width="6" height="18" fill="#2E7D32" clip-path="url(#shield-clip)"/>
  <ellipse cx="40" cy="34" rx="9" ry="9" fill="#2E7D32" clip-path="url(#shield-clip)"/>
  <!-- Vicuña (simplified silhouette) -->
  <ellipse cx="26" cy="62" rx="7" ry="4" fill="#8B5E3C" clip-path="url(#shield-clip)"/>
  <rect x="24" y="58" width="3" height="8" fill="#8B5E3C" clip-path="url(#shield-clip)"/>
  <rect x="28" y="58" width="3" height="8" fill="#8B5E3C" clip-path="url(#shield-clip)"/>
  <ellipse cx="22" cy="54" rx="4" ry="3" fill="#8B5E3C" clip-path="url(#shield-clip)"/>
  <!-- Cornucopia (right side, simplified) -->
  <path d="M54,56 Q62,48 58,68 Q50,72 52,60 Z" fill="#D4A017" clip-path="url(#shield-clip)"/>
  <!-- Shield border (gold) -->
  <path d="M40,4 L76,18 L76,58 Q76,84 40,96 Q4,84 4,58 L4,18 Z" fill="none" stroke="#C9A84C" stroke-width="2"/>
  <!-- Bottom label -->
  <text x="40" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#374151">ESCUDO NACIONAL</text>
</svg>
